<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Progress Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(145deg, #cbdce6);
      font-family: 'Bubblegum Sans', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    h1 {
      font-size: 48px;
      color: #0a4174;
      margin-bottom: 25px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .progress-box {
      background: #ffffff;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      padding: 40px 50px;
      text-align: center;
      width: 440px;
      transition: all 0.3s ease-in-out;
    }

    .progress-box:hover {
      transform: scale(1.02);
    }

    .exp-title {
      color: #0a4174;
      font-size: 26px;
      margin-bottom: 15px;
    }

    .bar {
      width: 100%;
      background: #e0e0e0;
      border-radius: 15px;
      height: 22px;
      margin: 15px 0;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #0a4174);
      width: 0;
      border-radius: 15px;
      transition: width 1s ease-in-out;
    }

    .level-text {
      font-size: 22px;
      color: #333;
      margin-top: 10px;
    }

    .message {
      background: #e8f4f8;
      border: 1px solid #0a4174;
      border-radius: 15px;
      padding: 18px;
      font-size: 18px;
      color: #0a4174;
      margin-top: 18px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
      line-height: 1.4em;
    }

    .buttons {
      margin-top: 25px;
      display: flex;
      justify-content: space-between;
      gap: 15px;
    }

    button {
      flex: 1;
      padding: 12px 18px;
      border: none;
      border-radius: 15px;
      background-color: #0a4174;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #1062af;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <h1>🌿 Your Progress</h1>

  <div class="progress-box">
    <div class="exp-title" id="expTitle">0 EXP Points</div>

    <div class="bar">
      <div class="bar-fill" id="barFill"></div>
    </div>

    <div class="level-text" id="levelText">Level 1</div>

    <div class="message" id="gainMsg">
      You received 0 EXP for your last quiz.
    </div>

    <div class="buttons">
      <button onclick="window.location.href='/quiz'">🎯 Take Quiz</button>
      <button onclick="window.location.href='/history'">📜 View History</button>
      <button onclick="window.location.href='/dashboard2'">🏠 Dashboard</button>
    </div>
  </div>

  <script>
    function updateProgress() {
      const user = "{{ user_name }}";  // fetched from Flask session
      const keyExp = `expPoints_${user}`;
      const keyGain = `lastGain_${user}`;

      let exp = parseInt(localStorage.getItem(keyExp) || '0');
      let lastGain = parseInt(localStorage.getItem(keyGain) || '0');

      // Each question gives 5 points, Level up every 100 EXP
      let level = Math.floor(exp / 100) + 1;
      let expInLevel = exp % 100;
      let percent = (expInLevel / 100) * 100;

      document.getElementById('expTitle').textContent = `${exp} EXP Points`;
      document.getElementById('levelText').textContent = `Level ${level}`;
      document.getElementById('barFill').style.width = percent + '%';
      document.getElementById('gainMsg').textContent =
        lastGain > 0
          ? `You earned +${lastGain} EXP in your last quiz! 🌟`
          : `No recent quiz activity yet — take one to start earning EXP! 💪`;
    }

    window.onload = updateProgress;
  </script>
</body>
</html>
