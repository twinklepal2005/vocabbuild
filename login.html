<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | VocabBuild</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #cbdce6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Bubblegum Sans', cursive;
        }

        h1 {
            font-size: 80px;
            color:  #0a4174;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.3);
            margin-bottom: 20px;
              margin-top: 5px;
        }

        form {
            background-color:#001d39;
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input {
            width: 250px;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            text-align: center;
            font-family: 'Bubblegum Sans', cursive;
            outline: none;
        }

        button {
            background-color: #bbd8e9;
            color: #0a4174;
            font-size: 25px;
            padding: 12px 40px;
            border: none;
            border-radius: 25px;
            margin-top: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .register-link {
            background-color: transparent;
            color: #0a4174;
            font-size: 18px;
            border: 2px solid #0a4174;
            border-radius: 20px;
            padding: 8px 20px;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .register-link:hover {
           background-color: #0a4174;
            color: #cbdce6;
            transform: scale(1.05);
        }

        .flash {
            margin-top: 20px;
            color: #fff;
            font-size: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1>Login</h1>
    <form method="POST" autocomplete="off">
        <input type="text" name="name" placeholder="Enter your name" required>
        <input type="email" name="email" placeholder="Enter your email" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    <!-- Register as a small link -->
    <a href="{{ url_for('register') }}" class="register-link">Don't have an account? Register</a>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="flash">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
</body>
</html>
