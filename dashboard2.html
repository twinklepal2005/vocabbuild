<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            background-color:  #cbdce6;
            font-family: 'Bubblegum Sans', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding-top: 120px; /* space for fixed header */
        }

        /* Header */
        .header {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            background-color:  #cbdce6;
            z-index: 1000;
        }

        .header i {
            font-size: 40px;
            color: #0a4174;
            margin-right: 15px;
        }

        .header span {
            font-size: 28px;
            color: #0a4174;
        }

        /* Main heading */
        h1 {
            font-size: 60px;
            color: #0a4174;
            margin-bottom: 50px;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }

        /* Main container */
        .container {
            background-color: #85b8c9;
            padding: 60px 50px;
            border-radius: 25px;
            box-shadow: 0 6px 20px rgba(72, 70, 70, 0.3);
            text-align: center;
            width: 500px;
            max-width: 90%;
        }

        .container h2 {
            font-size: 36px;
            color: #0a4174;
            margin-bottom: 40px;
        }

        /* Option buttons */
        .option-btn {
            width: 80%;
            padding: 15px;
            margin: 15px 0;
            border: none;
            border-radius: 20px;
            background-color: #195061;
            color: white;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .option-btn:hover {
            background-color: #4b7784;
            transform: scale(1.05);
        }

        a {
      color: #0a4174;
      margin-top: 35px;
      display: inline-block;
      text-decoration: none;
      font-size: 20px;
    }

    a:hover {
      text-decoration: underline;
    }

    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <i class="fa-solid fa-user"></i>
        <span>{{ user_name }}</span>
    </div>

    <!-- Main Section -->
    <h1 style="margin-top: 20px;">Quizz</h1>

    <div class="container">
        <h2>Welcome Back 👋</h2>
        <button class="option-btn" onclick="location.href='/quiz'">Take Quiz</button>
        <button class="option-btn" onclick="location.href='/history'">Track Record</button>
        <button class="option-btn" onclick="location.href='/progress'">Progress</button>
    </div>

    <a href="/dashboard" style="font-family: Verdana, Geneva, Tahoma, sans-serif;">← Back</a>

</body>
</html>
